// ---------------------------------------------------------------------------
// Authenticator App opt-in flag.
// Computed once here and reused by both pluginManagement and module includes.
// Priority (highest wins):
//   1. Command line:              ./gradlew -PincludeAuthenticatorApp=true ...
//   2. ~/.gradle/gradle.properties (per-user, never committed)
//   3. gradle.properties           (committed project default)
//   4. local.properties            (per-checkout, gitignored — fallback only)
// providers.gradleProperty() already resolves 1-3, so we only fall back to
// local.properties when none of those are set.
// ---------------------------------------------------------------------------
def __localProps = new Properties()
def __localPropsFile = new File(settings.rootDir, 'local.properties')
if (__localPropsFile.exists()) {
    __localPropsFile.withInputStream { __localProps.load(it) }
}
def includeAuthenticatorApp = (providers.gradleProperty('includeAuthenticatorApp').getOrNull()
        ?: __localProps.getProperty('includeAuthenticatorApp') ?: 'false').toString() == 'true'

pluginManagement {
    // ---------------------------------------------------------------------------
    // Authenticator plugin versions — loaded from authenticator/PhoneFactor/gradle.properties
    // so we don't duplicate / drift from Authenticator's canonical versions.
    // Falls back to sensible defaults when Authenticator isn't checked out (the plugins
    // are still declared `apply false` in the root build.gradle, but never applied).
    // ---------------------------------------------------------------------------
    def __authProps = new Properties()
    def __authPropsFile = new File(settings.rootDir, 'authenticator/PhoneFactor/gradle.properties')
    if (__authPropsFile.exists()) {
        __authPropsFile.withInputStream { __authProps.load(it) }
    }
    def __kotlinVersion = __authProps.getProperty('kotlin_version') ?: '2.0.21'
    def __roomVersion   = __authProps.getProperty('androidx_room_persistence_version') ?: '2.6.1'
    // KSP is coupled to BOTH kotlin_version AND its own increment suffix, so it must stay
    // pinned as a whole string. Kept in one place here as the single source of truth.
    def __kspVersion    = '2.0.21-1.0.27'

    resolutionStrategy {
        eachPlugin {
            switch (requested.id.id) {
                case 'com.google.devtools.ksp':
                    useVersion(__kspVersion); break
                case 'org.jetbrains.kotlin.plugin.compose':
                    useVersion(__kotlinVersion); break
                case 'androidx.room':
                    useVersion(__roomVersion); break
            }
        }
    }

    repositories {
        mavenLocal()
        google()
        // If you don't have access to the package feed below, uncomment the maven central repo
        // mavenCentral()
        gradlePluginPortal()
        maven {
            // msazure and aria are consumed via upstream sources of the NewAndroid feed.
            name "vsts-maven-new-android"
            url "https://identitydivision.pkgs.visualstudio.com/_packaging/NewAndroid/maven/v1"
            credentials {
                username System.getenv("ENV_VSTS_MVN_CRED_USERNAME") != null ? System.getenv("ENV_VSTS_MVN_CRED_USERNAME") : vstsUsername
                password System.getenv("ENV_VSTS_MVN_CRED_ACCESSTOKEN") != null ? System.getenv("ENV_VSTS_MVN_CRED_ACCESSTOKEN") : vstsMavenAccessToken
            }
        }

        // Authenticator App feed — only registered when Authenticator modules are enabled.
        if (includeAuthenticatorApp) {
            maven {
                name "vsts-maven-authapp"
                url "https://msazure.pkgs.visualstudio.com/One/_packaging/AuthApp/maven/v1"
                credentials {
                    username "VSTS"
                    password System.getenv("SYSTEM_ACCESSTOKEN") != null ? System.getenv("SYSTEM_ACCESSTOKEN") : providers.gradleProperty("adoMsazureAuthAppAccessToken").getOrElse("")
                }

                // Accept artifacts without POMs. DexGuard is stored in external feed without POM.
                metadataSources {
                    mavenPom() // Try to find the POM first (preferred)
                    artifact() // If no POM, accept the JAR anyway (fallback)
                }
            }
        }
    }
}

